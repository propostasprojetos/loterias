<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>LotoSmart Worker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-brand">
      <span class="brand-icon">🎲</span>
      <div>
        <h1 class="brand-title">LotoSmart</h1>
        <span class="brand-subtitle">Worker de Automação</span>
      </div>
    </div>
    <span id="version-badge" class="version-badge">v1.0.0</span>
  </header>

  <!-- ===== STATUS CARD ===== -->
  <section class="status-card">
    <div class="status-row">
      <span class="status-label">Status do Robô</span>
      <div class="status-indicator" id="status-indicator">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Verificando...</span>
      </div>
    </div>
    <div class="status-divider"></div>
    <div class="status-row">
      <span class="status-label">Autenticação</span>
      <div class="status-indicator" id="auth-indicator">
        <span class="status-dot offline" id="auth-dot"></span>
        <span class="status-text" id="auth-text">Desconectado</span>
      </div>
    </div>
  </section>

  <!-- ===== STATS ===== -->
  <section class="stats-grid">
    <div class="stat-card">
      <span class="stat-value" id="stat-queue">0</span>
      <span class="stat-label">Na Fila</span>
    </div>
    <div class="stat-card">
      <span class="stat-value stat-success" id="stat-done">0</span>
      <span class="stat-label">Concluídos</span>
    </div>
    <div class="stat-card">
      <span class="stat-value stat-error" id="stat-errors">0</span>
      <span class="stat-label">Erros</span>
    </div>
  </section>

  <!-- ===== TOGGLE ===== -->
  <section class="toggle-section">
    <label class="toggle-container" for="toggle-worker">
      <span class="toggle-label">Ativar Worker</span>
      <div class="toggle-switch">
        <input type="checkbox" id="toggle-worker" disabled>
        <span class="toggle-slider"></span>
      </div>
    </label>
    <p class="toggle-hint" id="toggle-hint">Faça login no painel para ativar.</p>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <a href="#" id="link-dashboard" class="footer-link">Abrir Dashboard</a>
    <span class="footer-sep">•</span>
    <a href="#" id="link-logs" class="footer-link">Ver Logs</a>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
